<div class="feature-container">

    <!-- Stats Dashboard overview -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-inner">
                <span class="stat-name">Active00 Projects</span>
                <span class="stat-value text-indigo">{{ activeCount }}</span>
            </div>
            <div class="stat-glow indigo-glow"></div>
        </div>

        <div class="stat-card">
            <div class="stat-inner">
                <span class="stat-name">Allocated Budget</span>
                <span class="stat-value text-emerald">\${{ totalBudget | number:'1.0-0' }}</span>
            </div>
            <div class="stat-glow emerald-glow"></div>
        </div>

        <div class="stat-card">
            <div class="stat-inner">
                <span class="stat-name">Projects Total</span>
                <span class="stat-value">{{ totalItems }}</span>
            </div>
            <div class="stat-glow white-glow"></div>
        </div>
    </div>

    <!-- Toast Alerts -->
    @if (toastMessage) {
    <div class="toast-alert" [class]="toastType">
        <span>{{ toastMessage }}</span>
    </div>
    }

    <!-- Reusable Standardized Toolbar Component -->
    <app-toolbar title="Locap Projects Administrator"
        subtitle="Standardized Locap project registry, budgets, and milestones." primaryActionLabel="Initiate Project"
        primaryActionIcon="plus" (primaryActionClick)="openCreateModal()">
        <!-- Reusable Search Box projected in the Toolbar -->
        <app-search-box leftControls placeholder="Search projects..." [value]="queryParams.search || ''"
            (search)="onSearch($event)"></app-search-box>

        <!-- Reusable Status Filter projected in the Toolbar -->
        <app-searchable-dropdown rightControls [options]="statusFilterOptions"
            [selectedValue]="queryParams['status'] || ''" placeholder="Filter status (All)"
            (selectionChange)="onStatusFilter($event)" class="status-dropdown-filter"></app-searchable-dropdown>
    </app-toolbar>

    <!-- Reusable Loading Spinner Overlay -->
    <app-loading-spinner [visible]="isLoading" message="Consulting project records..."></app-loading-spinner>

    <!-- Main Data Table Container -->
    <div class="data-view-card">
        <!-- Reusable Data Table Component -->
        <app-data-table [data]="projects" [columns]="columns" [currentSortKey]="queryParams.sortKey || ''"
            [currentSortDir]="queryParams.sortDir || ''" [actions]="tableActions" (sortChange)="onSortChange($event)"
            (actionClick)="onRowAction($event)"></app-data-table>

        <!-- Reusable Pagination Component -->
        <app-pagination [pageIndex]="queryParams.pageIndex || 0" [pageSize]="queryParams.pageSize || 10"
            [totalItems]="totalItems" (pageChange)="onPageChange($event)"></app-pagination>
    </div>

    <!-- Add / Edit Modal -->
    <app-project-form-modal [visible]="isFormModalOpen" [project]="selectedProject" [managers]="managers"
        [isView]="isViewMode" (save)="onSaveProject($event)" (cancel)="closeFormModal()"></app-project-form-modal>

    <!-- Reusable Confirmation Dialog for Deletions -->
    <app-confirmation-dialog [visible]="isConfirmOpen" title="Delete Locap Project?"
        [message]="deleteConfirmationMessage" confirmLabel="Destroy Record" cancelLabel="Keep Project" type="danger"
        (confirm)="confirmDelete()" (cancel)="closeConfirm()"></app-confirmation-dialog>

</div>
