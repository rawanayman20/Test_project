<div class="toolbar-wrapper">
    <div class="toolbar-header">
        <div class="title-section">
            <h1 class="title">{{ title }}</h1>
            @if (subtitle) {
            <p class="subtitle">{{ subtitle }}</p>
            }
        </div>

        <div class="actions-section">
            <!-- Transposed custom content (filters, search box, filters, toggle, etc.) -->
            <div class="custom-content">
                <ng-content select="[leftControls]"></ng-content>
            </div>

            <div class="custom-content">
                <ng-content select="[rightControls]"></ng-content>
            </div>

            @if (primaryActionLabel) {
            <button type="button" class="primary-action-btn" (click)="primaryActionClick.emit()">
                @if (primaryActionIcon === 'plus') {
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                } @else if (primaryActionIcon === 'refresh') {
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                }
                <span>{{ primaryActionLabel }}</span>
            </button>
            }
        </div>
    </div>
</div>
